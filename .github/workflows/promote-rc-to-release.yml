name: Promote RC to Final Release

on:
  pull_request:
    branches:
      - main
    types: [closed]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  release:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'integration'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version from manifest.json
        id: version
        run: |
          VERSION=$(jq -r '.version' custom_components/intelligent_heating_pilot/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag-check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️ Le tag v${{ steps.version.outputs.version }} existe déjà"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare release notes
        id: release-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          CHANGELOG_CONTENT=$(awk '/## \[Unreleased\]/{flag=1;next} flag && /## \[/{flag=0} flag{print}' CHANGELOG.md)
          if [ -z "$CHANGELOG_CONTENT" ]; then
            echo "❌ Aucune entrée Unreleased dans CHANGELOG.md"
            exit 1
          fi

          # Count RC iterations for traceability (GitHub Releases API = ground truth)
          RC_TAGS=$(gh release list --json tagName,isPrerelease \
            --jq --arg v "$VERSION" \
            '[.[] | select(.isPrerelease == true and (.tagName | test("^v" + $v + "-rc")))] | sort_by(.tagName) | .[].tagName')
          RC_COUNT=$(echo "$RC_TAGS" | grep -c . || true)
          LATEST_RC=$(echo "$RC_TAGS" | tail -1)

          {
            echo "$CHANGELOG_CONTENT"
            if [ "$RC_COUNT" -gt 0 ]; then
              echo ""
              echo "---"
              echo ""
              echo "> ✅ Validé via ${RC_COUNT} release candidate(s). Dernière RC : \`${LATEST_RC}\`"
            fi
          } > /tmp/release-notes.md

      - name: Update CHANGELOG with version
        run: |
          TODAY=$(date +%Y-%m-%d)
          VERSION="${{ steps.version.outputs.version }}"

          # Remplace [Unreleased] par la version actuelle
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [$VERSION] - $TODAY/" CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG for v$VERSION"
          git push origin main

      - name: Delete RC and dev pre-releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Query GitHub Releases API for all pre-releases matching this version (ground truth)
          RC_TAGS=$(gh release list --json tagName,isPrerelease \
            --jq --arg v "$VERSION" \
            '[.[] | select(.isPrerelease == true and (.tagName | test("^v" + $v + "-(rc|dev)")))] | .[].tagName')
          for tag in $RC_TAGS; do
            echo "🗑️ Deleting GitHub release $tag..."
            gh release delete "$tag" --yes 2>/dev/null || true
            git push origin ":refs/tags/$tag" 2>/dev/null || true
          done

      - name: Create release
        if: steps.tag-check.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          gh release create "$TAG" \
            --title "🚀 Release $VERSION" \
            --notes-file /tmp/release-notes.md \
            --latest \
            --target main

      - name: Comment on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "🚀 **Release v${{ steps.version.outputs.version }} publiée !**

          La release est maintenant disponible pour tous les utilisateurs.

          **Prochaines étapes :**
          1. Créer une nouvelle branche à partir de \`integration\` pour la prochaine version
          2. Incrémenter la version dans \`manifest.json\` et \`hacs.json\`
          3. Vérifier que HACS détecte bien la nouvelle release
          "
