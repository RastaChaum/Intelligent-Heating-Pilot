name: Promote RC to Final Release

on:
  pull_request:
    branches:
      - main
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  promote-release:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'integration'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract version from manifest.json
        id: version
        run: |
          VERSION=$(grep -oP '"version":\s*"\K[^"]+' custom_components/intelligent_heating_pilot/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version détectée: $VERSION"

      - name: Verify release notes exist
        run: |
          NOTES_FILE="GITHUB_RELEASE_v${{ steps.version.outputs.version }}.md"
          
          if [ ! -f "$NOTES_FILE" ]; then
            echo "❌ Fichier de release notes manquant: $NOTES_FILE"
            echo "Ce fichier aurait dû être créé lors de la préparation du RC"
            exit 1
          fi
          
          echo "✅ Release notes trouvées: $NOTES_FILE"

      - name: Find latest RC tag
        id: rc-tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Trouver le dernier RC pour cette version
          LATEST_RC=$(git tag -l "v${VERSION}-rc*" | sort -V | tail -1)
          
          if [ -z "$LATEST_RC" ]; then
            echo "⚠️ Aucun RC trouvé pour v${VERSION}"
            echo "has_rc=false" >> $GITHUB_OUTPUT
          else
            echo "has_rc=true" >> $GITHUB_OUTPUT
            echo "latest_rc=$LATEST_RC" >> $GITHUB_OUTPUT
            echo "📌 Dernier RC: $LATEST_RC"
          fi

      - name: Check if final tag already exists
        id: tag-check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "⚠️ Le tag final ${{ steps.version.outputs.tag }} existe déjà"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Update CHANGELOG.md
        run: |
          TODAY=$(date +%Y-%m-%d)
          VERSION="${{ steps.version.outputs.version }}"
          
          # Remplacer [Unreleased] par la version actuelle
          if grep -q "## \[Unreleased\]" CHANGELOG.md; then
            sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [$VERSION] - $TODAY/" CHANGELOG.md
            
            git add CHANGELOG.md
            git commit -m "chore(release): update CHANGELOG for v$VERSION"
            git push origin main
            
            echo "✅ CHANGELOG.md mis à jour"
          else
            echo "⚠️ Section [Unreleased] non trouvée dans CHANGELOG.md"
          fi

      - name: Update version in all files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Liste des fichiers à vérifier/mettre à jour
          FILES_UPDATED=0
          
          # manifest.json (déjà à jour normalement)
          if grep -q "\"version\": \"$VERSION\"" custom_components/intelligent_heating_pilot/manifest.json; then
            echo "✅ manifest.json: version OK"
          fi
          
          # const.py
          if grep -q "VERSION = \"$VERSION\"" custom_components/intelligent_heating_pilot/const.py; then
            echo "✅ const.py: version OK"
          else
            sed -i "s/VERSION = \".*\"/VERSION = \"$VERSION\"/" custom_components/intelligent_heating_pilot/const.py
            git add custom_components/intelligent_heating_pilot/const.py
            FILES_UPDATED=$((FILES_UPDATED + 1))
            echo "🔄 const.py mis à jour"
          fi
          
          # hacs.json (si présent)
          if [ -f "hacs.json" ]; then
            if grep -q "\"version\": \"$VERSION\"" hacs.json; then
              echo "✅ hacs.json: version OK"
            else
              sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" hacs.json
              git add hacs.json
              FILES_UPDATED=$((FILES_UPDATED + 1))
              echo "🔄 hacs.json mis à jour"
            fi
          fi
          
          # Commit si des fichiers ont été modifiés
          if [ $FILES_UPDATED -gt 0 ]; then
            git commit -m "chore(release): sync version numbers for v$VERSION"
            git push origin main
            echo "✅ $FILES_UPDATED fichier(s) de version mis à jour"
          fi

      - name: Create final release tag
        if: steps.tag-check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Créer le message du tag
          TAG_MESSAGE="Release v$VERSION

Cette release a été testée en tant que release candidate.
"
          
          if [ "${{ steps.rc-tag.outputs.has_rc }}" == "true" ]; then
            TAG_MESSAGE+="
Basée sur: ${{ steps.rc-tag.outputs.latest_rc }}"
          fi
          
          git tag -a "${{ steps.version.outputs.tag }}" -m "$TAG_MESSAGE"
          git push origin "${{ steps.version.outputs.tag }}"
          
          echo "✅ Tag final créé: ${{ steps.version.outputs.tag }}"

      - name: Delete RC pre-releases
        if: steps.rc-tag.outputs.has_rc == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Supprimer toutes les pre-releases RC pour cette version
          for RC_TAG in $(git tag -l "v${VERSION}-rc*"); do
            echo "🗑️ Suppression de la pre-release: $RC_TAG"
            gh release delete "$RC_TAG" --yes 2>/dev/null || true
          done

      - name: Create final GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          
          # Préparer les release notes finales
          cat "GITHUB_RELEASE_v${VERSION}.md" > /tmp/final-release-notes.md
          
          # Ajouter les issues fermées
          echo "" >> /tmp/final-release-notes.md
          echo "---" >> /tmp/final-release-notes.md
          echo "" >> /tmp/final-release-notes.md
          echo "**Issues Fixed:**" >> /tmp/final-release-notes.md
          
          # Extraire les numéros d'issues
          grep -oP '(?<=\[#)\d+(?=\])' "GITHUB_RELEASE_v${VERSION}.md" | sort -u | while read issue; do
            echo "Closes #$issue" >> /tmp/final-release-notes.md
          done
          
          # Créer la release finale
          gh release create "$TAG" \
            --title "🚀 Release v${VERSION}" \
            --notes-file /tmp/final-release-notes.md \
            --latest \
            --target main
          
          echo "✅ Release finale créée"

      - name: Close referenced issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Fermer toutes les issues référencées
          grep -oP '(?<=\[#)\d+(?=\])' "GITHUB_RELEASE_v${VERSION}.md" | sort -u | while read issue; do
            echo "📝 Fermeture de l'issue #$issue"
            gh issue close "$issue" --comment "✅ Corrigé dans la release v${VERSION}" || true
            gh issue edit "$issue" --add-label "released" || true
          done

      - name: Close RC tracking issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Chercher et fermer l'issue de tracking RC
          ISSUE_NUMBER=$(gh issue list \
            --label "release-candidate" \
            --search "RC Testing: v${VERSION}" \
            --state open \
            --json number \
            --jq '.[0].number')
          
          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue close "$ISSUE_NUMBER" --comment "✅ Release candidate promue en release finale: v${VERSION}

La release est maintenant disponible pour tous les utilisateurs.
Merci à tous les testeurs !"
            echo "✅ Issue de tracking RC fermée: #$ISSUE_NUMBER"
          fi

      - name: Cleanup release notes file
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Optionnel: Supprimer le fichier de release notes
          # Décommenter si vous voulez nettoyer automatiquement
          # git rm "GITHUB_RELEASE_v${VERSION}.md"
          # git commit -m "chore: cleanup release notes after v${VERSION}"
          # git push origin main
          
          echo "ℹ️ Fichier GITHUB_RELEASE_v${VERSION}.md conservé pour référence"

      - name: Comment on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          COMMENT="## 🎉 Release v${VERSION} publiée avec succès !

La release finale est maintenant disponible pour tous les utilisateurs.

### 📋 Actions effectuées
- ✅ CHANGELOG.md mis à jour
- ✅ Versions synchronisées dans tous les fichiers
- ✅ Tag final créé: \`v${VERSION}\`
- ✅ Release GitHub publiée (non pre-release)
- ✅ Issues fermées automatiquement
"
          
          if [ "${{ steps.rc-tag.outputs.has_rc }}" == "true" ]; then
            COMMENT+="- ✅ Pre-releases RC nettoyées
- 📌 RC de base: \`${{ steps.rc-tag.outputs.latest_rc }}\`
"
          fi
          
          COMMENT+="
### 🔗 Liens
- [Release GitHub](${{ github.server_url }}/${{ github.repository }}/releases/tag/v${VERSION})
- [CHANGELOG](../blob/main/CHANGELOG.md)

### 📋 Prochaines étapes
1. Vérifier que HACS détecte la nouvelle release
2. Annoncer la release (forum, discussions)
3. Surveiller les retours utilisateurs
4. Commencer le développement de la prochaine version sur \`integration\`
"
          
          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT"

      - name: Summary
        run: |
          echo "## 🎉 Release v${{ steps.version.outputs.version }} publiée !" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ steps.version.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branche:** \`main\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.rc-tag.outputs.has_rc }}" == "true" ]; then
            echo "**RC de base:** \`${{ steps.rc-tag.outputs.latest_rc }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Succès" >> $GITHUB_STEP_SUMMARY
          echo "La release est maintenant disponible pour tous les utilisateurs !" >> $GITHUB_STEP_SUMMARY
