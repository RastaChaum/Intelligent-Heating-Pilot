name: Increment RC Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Base version (e.g., 0.5.0)'
        required: true
        type: string
      fix_description:
        description: 'Description of fixes in this RC increment'
        required: true
        type: string

permissions:
  contents: write
  issues: write

jobs:
  increment-rc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: integration
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Find next RC number
        id: rc-number
        run: |
          VERSION="${{ inputs.version }}"
          
          # Trouver le dernier RC pour cette version
          LAST_RC=$(git tag -l "v${VERSION}-rc*" | sort -V | tail -1)
          
          if [ -z "$LAST_RC" ]; then
            echo "❌ Aucun RC trouvé pour v${VERSION}"
            echo "Utilisez d'abord le workflow 'Prepare Release Candidate'"
            exit 1
          fi
          
          # Extraire le numéro du dernier RC
          LAST_RC_NUM=$(echo "$LAST_RC" | grep -oP 'rc\K\d+')
          NEXT_RC_NUM=$((LAST_RC_NUM + 1))
          
          echo "last_rc=$LAST_RC" >> $GITHUB_OUTPUT
          echo "next_rc_num=$NEXT_RC_NUM" >> $GITHUB_OUTPUT
          echo "next_rc_tag=v${VERSION}-rc${NEXT_RC_NUM}" >> $GITHUB_OUTPUT
          
          echo "📊 Dernier RC: $LAST_RC"
          echo "📊 Prochain RC: v${VERSION}-rc${NEXT_RC_NUM}"

      - name: Update release notes
        run: |
          VERSION="${{ inputs.version }}"
          RC_NUM="${{ steps.rc-number.outputs.next_rc_num }}"
          
          # Ajouter les corrections au fichier de release notes
          cat >> "GITHUB_RELEASE_v${VERSION}.md" << EOF

          ---

          ## 🔧 RC ${RC_NUM} - $(date +%Y-%m-%d)

          ${{ inputs.fix_description }}

          EOF

      - name: Commit updated release notes
        run: |
          git add "GITHUB_RELEASE_v${{ inputs.version }}.md"
          git commit -m "chore(release): update RC notes for v${{ inputs.version }}-rc${{ steps.rc-number.outputs.next_rc_num }}" -m "Corrections:" -m "${{ inputs.fix_description }}"
          git push origin integration

      - name: Create new RC tag
        run: |
          git tag -a "${{ steps.rc-number.outputs.next_rc_tag }}" -m "Release Candidate v${{ inputs.version }}-rc${{ steps.rc-number.outputs.next_rc_num }}" -m "Corrections apportées:" -m "${{ inputs.fix_description }}"
          
          git push origin "${{ steps.rc-number.outputs.next_rc_tag }}"

      - name: Delete previous RC release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Supprimer l'ancienne pre-release (mais garder le tag pour l'historique)
          gh release delete "${{ steps.rc-number.outputs.last_rc }}" --yes 2>/dev/null || true

      - name: Create new GitHub Pre-Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.rc-number.outputs.next_rc_tag }}" \
            --title "🧪 v${{ inputs.version }}-rc${{ steps.rc-number.outputs.next_rc_num }} - Release Candidate" \
            --notes-file "GITHUB_RELEASE_v${{ inputs.version }}.md" \
            --prerelease \
            --target integration

      - name: Find and update tracking issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          RC_NUM="${{ steps.rc-number.outputs.next_rc_num }}"
          
          # Chercher l'issue de tracking
          ISSUE_NUMBER=$(gh issue list \
            --label "release-candidate" \
            --search "RC Testing: v${VERSION}" \
            --json number \
            --jq '.[0].number')
          
          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue comment "$ISSUE_NUMBER" --body "## 🔄 Nouveau RC disponible: rc${RC_NUM}

            **Tag:** \`${{ steps.rc-number.outputs.next_rc_tag }}\`

            ### Corrections apportées
            ${{ inputs.fix_description }}

            ### 🔗 Lien
            [Pre-Release GitHub](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.rc-number.outputs.next_rc_tag }})

            Merci de tester cette nouvelle version et de signaler tout problème dans cette issue."
          fi

      - name: Summary
        run: |
          echo "## ✅ Nouvelle Release Candidate créée" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ steps.rc-number.outputs.next_rc_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Précédent:** \`${{ steps.rc-number.outputs.last_rc }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Corrections" >> $GITHUB_STEP_SUMMARY
          echo "${{ inputs.fix_description }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Prochaines étapes" >> $GITHUB_STEP_SUMMARY
          echo "1. Testez la nouvelle RC" >> $GITHUB_STEP_SUMMARY
          echo "2. Si autres corrections nécessaires → relancer ce workflow" >> $GITHUB_STEP_SUMMARY
          echo "3. Si tout OK → créer PR `integration` → `main` pour release finale" >> $GITHUB_STEP_SUMMARY
