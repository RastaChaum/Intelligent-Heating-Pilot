name: Feature/Fix PR Checks

on:
  pull_request:
    branches:
      - integration
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch naming
        run: |
          BRANCH="${{ github.head_ref }}"
          
          if [[ ! "$BRANCH" =~ ^(feature|fix)- ]]; then
            echo "❌ La branche doit commencer par 'feature-' ou 'fix-'"
            echo "Nom actuel : $BRANCH"
            exit 1
          fi
          
          echo "✅ Nom de branche valide : $BRANCH"

      - name: Check CHANGELOG update
        id: changelog-check
        run: |
          if ! git diff origin/integration --name-only | grep -q "CHANGELOG.md"; then
            echo "updated=false" >> $GITHUB_OUTPUT
            echo "❌ CHANGELOG.md n'a pas été mis à jour"
          else
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "✅ CHANGELOG.md a été mis à jour"
          fi

      - name: Suggest CHANGELOG template
        if: steps.changelog-check.outputs.updated == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.head_ref }}"
          TYPE="Added"
          
          if [[ "$BRANCH" =~ ^fix- ]]; then
            TYPE="Fixed"
          fi
          
          gh pr comment ${{ github.event.pull_request.number }} --body "⚠️ **CHANGELOG non mis à jour**
          
          Veuillez ajouter une entrée dans la section \`[Unreleased]\` du CHANGELOG.md :
          
          \`\`\`markdown
          ## [Unreleased]
          
          ### $TYPE
          - [Description orientée utilisateur de votre changement]
          \`\`\`
          
          **Bonnes pratiques :**
          - Utilisez un langage simple et compréhensible par l'utilisateur final
          - Évitez les détails techniques sauf si pertinent
          - Décrivez le bénéfice, pas l'implémentation
          
          **Exemples :**
          - ✅ \`Amélioration du calcul du temps de préchauffage\`
          - ❌ \`Refactorisation de PilotController.calculate_preheat_duration()\`
          "

      - name: Check for documentation updates on features
        if: startsWith(github.head_ref, 'feature-')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DOCS_CHANGED=$(git diff origin/integration --name-only | grep -E '(README.md|docs/)' | wc -l)
          
          if [ "$DOCS_CHANGED" -eq "0" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "📚 **Rappel : Documentation utilisateur**
            
            Cette PR ajoute une nouvelle fonctionnalité. N'oubliez pas de mettre à jour la documentation si nécessaire :
            - \`README.md\` : Guide utilisateur principal
            - \`docs/\` : Documentation technique détaillée
            
            Si la fonctionnalité n'est pas visible par l'utilisateur final, vous pouvez ignorer ce message.
            "
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest tests/unit -v

      - name: Comment test results
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ $? -eq 0 ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "✅ **Tests unitaires réussis**"
          else
            gh pr comment ${{ github.event.pull_request.number }} --body "❌ **Tests unitaires échoués**
            
            Veuillez corriger les tests avant de merger."
          fi
